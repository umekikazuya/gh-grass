version: 2

project_name: gh-grass

release:
  name_template: "v{{ .Version }}"

before:
  hooks:
    - go mod download

builds:
  - id: gh-grass
    main: ./cmd/gh-grass
    binary: gh-grass
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/umekikazuya/gh-grass/internal/ui.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
